<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a3d62" />

  <!-- Resource hints for faster loading -->
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="preconnect" href="https://world.openfoodfacts.org" crossorigin />
  <link rel="dns-prefetch" href="https://images.openfoodfacts.org" />

  <!-- Preload critical resources -->
  <link rel="preload" href="styles.css" as="style" />
  <link rel="preload" href="app.js" as="script" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>ScanFi</title>

  <!-- Inline critical CSS for splash screen (shows instantly) -->
  <style>
    .splash{position:fixed;inset:0;background:#0a3d62;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s,visibility .3s}
    .splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .splash-brand{font-size:2.5rem;font-weight:700;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    .splash-brand span{color:#38ada9}
    .splash-dots{margin-top:1.5rem;display:flex;gap:.5rem}
    .splash-dot{width:10px;height:10px;background:#38ada9;border-radius:50%;animation:bounce 1.4s ease-in-out infinite}
    .splash-dot:nth-child(2){animation-delay:.2s}
    .splash-dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,80%,100%{transform:scale(0.8);opacity:0.5}40%{transform:scale(1.2);opacity:1}}
  </style>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Splash screen (shows instantly while app loads) -->
  <div id="splash" class="splash">
    <div class="splash-brand">Scan<span>Fi</span></div>
    <div class="splash-dots">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>

  <header class="topbar">
    <div class="brand">Scan<span>Fi</span></div>
    <div class="topbar-right">
      <a href="help.html" class="help-link" title="Help">?</a>
      <select id="langSelect" class="lang-select" aria-label="Language"></select>
    </div>
  </header>

  <main id="app">
    <!-- Scanner view -->
    <section id="scannerView" class="view">
      <p class="hint" id="hintText">Point your camera at the shelf code</p>
      <div id="reader" class="reader"></div>

      <div class="manual">
        <input id="manualCode" type="text" inputmode="text" placeholder="or type a shelf code (e.g. SKF-0001)" />
        <button id="manualBtn">Look up</button>
      </div>
      <div class="samples" id="samples"></div>
    </section>

    <!-- Product view -->
    <section id="productView" class="view hidden">
      <button id="backBtn" class="back">&larr; <span id="backLabel">Scan another</span></button>
      <div class="card" id="productCard"></div>
    </section>

    <div id="errorBox" class="error hidden"></div>
  </main>

  <footer class="footer" id="footer"></footer>

  <!-- app.js lazy-loads the scanner library when needed -->
  <script src="app.js"></script>
</body>
</html>
