<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScanFi Test Codes</title>
  <script src="https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { text-align: center; margin-bottom: 30px; }

    .app-qr {
      text-align: center;
      background: linear-gradient(135deg, #0a3d62 0%, #1a5276 100%);
      color: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
    }
    .app-qr h2 { margin: 0 0 10px 0; }
    .app-qr p { margin: 0 0 20px 0; opacity: 0.9; }
    .app-qr canvas {
      background: white;
      padding: 10px;
      border-radius: 8px;
      display: block;
      margin: 0 auto;
    }
    .app-url {
      font-family: monospace;
      font-size: 14px;
      margin-top: 15px;
      opacity: 0.8;
    }

    h2.section { text-align: center; margin: 30px 0 20px; }

    .product {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .product h3 {
      margin: 0 0 5px 0;
      font-size: 18px;
    }
    .product .brand {
      color: #666;
      margin-bottom: 15px;
    }
    .codes {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .code-block {
      text-align: center;
    }
    .code-block h4 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #333;
    }
    .code-block canvas {
      display: block;
      margin: 0 auto;
      background: white;
    }
    .code-value {
      font-family: monospace;
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }
    .download-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #0a3d62;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      text-decoration: none;
    }
    .download-btn:hover {
      background: #1a5276;
    }
  </style>
</head>
<body>
  <h1>ScanFi Test Codes</h1>

  <!-- App QR Code -->
  <div class="app-qr">
    <h2>App QR Code</h2>
    <p>Scan this to open the ScanFi app</p>
    <canvas id="app-qr"></canvas>
    <div class="app-url" id="app-url"></div>
    <button class="download-btn" onclick="downloadCanvas('app-qr', 'scanfi-app-qr.png')" style="margin-top:15px;">Download PNG</button>
  </div>

  <h2 class="section">Product Test Codes</h2>

  <div id="products"></div>

  <script>
    function downloadCanvas(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function downloadSvg(svgId, filename) {
      const svg = document.getElementById(svgId);
      const svgData = new XMLSerializer().serializeToString(svg);
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();

      img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
        const link = document.createElement('a');
        link.download = filename;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
    }

    // Generate App QR Code
    const appUrl = window.location.origin + '/';
    document.getElementById('app-url').textContent = appUrl;

    QRCode.toCanvas(document.getElementById('app-qr'), appUrl, {
      width: 250,
      margin: 2,
      errorCorrectionLevel: 'M',
      color: { dark: '#000000', light: '#ffffff' }
    }, function(error) {
      if (error) console.error('App QR error:', error);
    });

    const products = [
      { name: "Leipäjuusto — Finnish Squeaky Cheese", brand: "Juustoportti", shelfCode: "SKF-0001", gtin: "6411401012345" },
      { name: "Fazer Blue Milk Chocolate", brand: "Fazer", shelfCode: "SKF-0002", gtin: "6408430000018" },
      { name: "Paulig Juhla Mokka Coffee", brand: "Paulig", shelfCode: "SKF-0003", gtin: "6437002000027" },
      { name: "Sautéed Reindeer (frozen)", brand: "Atria", shelfCode: "SKF-0004", gtin: "6411300000034" },
      { name: "Finnish Rye Bread", brand: "Vaasan", shelfCode: "SKF-0005", gtin: "6411200000041" }
    ];

    const container = document.getElementById("products");

    products.forEach((p, i) => {
      const div = document.createElement("div");
      div.className = "product";
      div.innerHTML = `
        <h3>${p.name}</h3>
        <div class="brand">${p.brand}</div>
        <div class="codes">
          <div class="code-block">
            <h4>QR Code (Shelf Code)</h4>
            <canvas id="qr-${i}"></canvas>
            <div class="code-value">${p.shelfCode}</div>
            <button class="download-btn" onclick="downloadCanvas('qr-${i}', '${p.shelfCode}-qr.png')">Download QR</button>
          </div>
          <div class="code-block">
            <h4>Barcode (EAN-13)</h4>
            <svg id="barcode-${i}"></svg>
            <div class="code-value">${p.gtin}</div>
            <button class="download-btn" onclick="downloadSvg('barcode-${i}', '${p.shelfCode}-barcode.png')">Download Barcode</button>
          </div>
        </div>
      `;
      container.appendChild(div);

      // Generate QR code
      QRCode.toCanvas(document.getElementById(`qr-${i}`), p.shelfCode, {
        width: 180,
        margin: 2,
        errorCorrectionLevel: 'M',
        color: { dark: '#000000', light: '#ffffff' }
      }, function(error) {
        if (error) console.error('QR error:', error);
      });

      // Generate barcode
      JsBarcode(`#barcode-${i}`, p.gtin, {
        format: "EAN13",
        width: 2,
        height: 80,
        displayValue: true,
        fontSize: 16,
        background: "#ffffff"
      });
    });
  </script>
</body>
</html>
